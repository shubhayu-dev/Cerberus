<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cerberus — Authenticating...</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#050810;color:#c8d8f0;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
.spinner{width:40px;height:40px;border:2px solid #1a2540;border-top-color:#00e5ff;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
p{color:#4a6080;font-size:0.8rem;}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Authenticating with Auth0...</p>
<script>
// Auth0 implicit flow puts the token in the URL hash
// We extract it and POST it to our backend to store in session
(async function() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const state = params.get('state'); // ── ADD THIS: Extract the state ──
  const error = params.get('error');

  if (error) {
    document.querySelector('p').textContent = 'Auth error: ' + params.get('error_description');
    return;
  }

  if (!token) {
    document.querySelector('p').textContent = 'No token found. Redirecting...';
    setTimeout(() => window.location.href = '/', 2000);
    return;
  }

  // Persist access token for API calls from frontend and session storage
  localStorage.setItem('access_token', token);

  // Send token AND state to backend to store in session
  const resp = await fetch('/auth/store-token', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      access_token: token,
      state: state // ── ADD THIS: Tell the backend if this was an MFA step-up ──
    })
  });

  if (resp.ok) {
    // If we just finished an MFA flow, we can also set a flag here for the dashboard
    if (state === 'mfa_stepup') {
      console.log("MFA Step-up detected in callback");
    }
    window.location.href = '/dashboard';
  } else {
    document.querySelector('p').textContent = 'Failed to store token. Try again.';
    setTimeout(() => window.location.href = '/', 2000);
  }
})();
</script>
</body>
</html>
